<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saloon – Build Boldly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg {
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 50%, #6366f1 100%);
            position: relative;
            overflow: hidden;
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero-bg::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .content-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .feature-card {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            padding: 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            text-center;
            transform: rotate(-2deg);
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: rotate(0deg) scale(1.05);
        }
        .feature-card:nth-child(2) {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            transform: rotate(2deg);
        }
        .feature-card:nth-child(3) {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transform: rotate(-1deg);
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div class="hero-bg min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 relative">
        <div class="max-w-6xl w-full relative z-10">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <!-- Left: Bold Headline -->
                <div>
                    <h1 class="text-6xl lg:text-7xl font-bold mb-6 leading-tight text-white">
                        Build your platform<br/>
                        <span class="bg-gradient-to-r from-yellow-300 via-pink-300 to-purple-300 bg-clip-text text-transparent">fearlessly</span>
                    </h1>
                    <p class="text-xl text-white/90 mb-8 leading-relaxed font-medium">
                        Saloon bundles everything—auth, database, APIs, responsive design—so you focus on what makes your product unique, not infrastructure.
                    </p>
                    <button class="bg-white text-indigo-600 hover:bg-slate-100 font-bold py-4 px-10 rounded-xl transition-all duration-200 text-lg shadow-lg hover:shadow-xl">
                        Launch Your Project
                    </button>
                </div>
                <!-- Right: Feature Cards -->
                <div class="space-y-4">
                    <div class="feature-card">
                        🔐 Bulletproof Authentication
                    </div>
                    <div class="feature-card">
                        💾 Enterprise Database
                    </div>
                    <div class="feature-card">
                        📱 Mobile-First Design
                    </div>
                    <div class="content-box mt-8 text-center">
                        <p class="text-sm text-slate-600 font-semibold uppercase tracking-wide mb-2">Trusted by</p>
                        <p class="text-2xl font-bold text-slate-900">500+ Teams</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
